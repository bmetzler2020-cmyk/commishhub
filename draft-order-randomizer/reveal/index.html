<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draft Order Reveal — CommishHub</title>
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0A0705;
      color: #FAF7F0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .league-name {
      font-family: 'Lora', serif;
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: #FAF7F0;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 48px;
      opacity: .6;
    }

    /* ── Countdown ── */
    #countdown-state { text-align: center; }
    .countdown-label {
      font-size: .72rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(139,105,20,0.7); margin-bottom: 20px;
    }
    .countdown-display {
      font-family: 'Lora', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700; color: #F0D080;
      letter-spacing: .04em; line-height: 1;
      margin-bottom: 24px;
    }
    .countdown-sub {
      font-size: 1rem;
      color: rgba(250,247,240,0.4);
      font-style: italic;
    }

    /* ── Board reveal — hidden until ready ── */
    #reveal-state {
      display: none;  /* CRITICAL: hidden on load, shown only when ready */
      width: 100%;
      max-width: 960px;
    }
    .board {
      background: #1A0F07;
      border: 2px solid rgba(139,105,20,0.6);
      box-shadow: 0 0 40px rgba(139,105,20,0.2), 0 0 80px rgba(139,105,20,0.08),
                  inset 0 1px 0 rgba(139,105,20,0.18);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
    }
    .picks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .pick-card {
      background: #0F0807;
      border: 1px solid rgba(139,105,20,0.2);
      border-left: 2px solid rgba(139,105,20,0.35);
      border-radius: 6px;
      padding: 14px 18px;
      opacity: 0;
    }
    .pick-number {
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: #8B6914; margin-bottom: 6px;
    }
    .pick-name {
      font-family: 'Lora', serif;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #8B6914;
      min-height: 1.4em;
      letter-spacing: .02em;
      transition: color .3s;
    }
    .pick-name.settled { color: #FAF7F0; }

    /* ── Error ── */
    #error-state {
      display: none;
      text-align: center;
      color: rgba(250,247,240,0.5);
    }
    #error-state h2 {
      font-family: 'Lora', serif;
      color: #F0D080; margin-bottom: 12px;
    }
    #error-state a { color: #8B6914; text-decoration: none; }

    /* ── Loading ── */
    #loading-state {
      text-align: center;
      color: rgba(250,247,240,0.35);
      font-size: .88rem;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .picks-grid { grid-template-columns: 1fr; }
      .board { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <p class="league-name" id="league-name-display">CommishHub Draft Lottery</p>

  <!-- Loading — shown first while we fetch -->
  <div id="loading-state">Loading reveal...</div>

  <!-- Countdown — shown when time hasn't arrived yet -->
  <div id="countdown-state" style="display:none;">
    <p class="countdown-label">Reveal begins in</p>
    <div class="countdown-display" id="countdown-timer">--:--:--</div>
    <p class="countdown-sub">The pick is in. Hang tight.</p>
  </div>

  <!-- Reveal board — shown only when ready to animate -->
  <div id="reveal-state" style="display:none;">
    <div class="board">
      <div class="picks-grid" id="picks-grid"></div>
    </div>
  </div>

  <!-- Error -->
  <div id="error-state" style="display:none;">
    <h2>Reveal not found.</h2>
    <p>This link may have expired or the ID is incorrect.<br/>
       <a href="/draft-order-randomizer/">Create a new one →</a>
    </p>
  </div>

  <script>
    // ── Helpers ───────────────────────────────────────────
    function show(id)  { document.getElementById(id).style.display = 'block'; }
    function hide(id)  { document.getElementById(id).style.display = 'none'; }
    function showError() { hide('loading-state'); hide('countdown-state'); hide('reveal-state'); show('error-state'); }

    // ── Get reveal ID ─────────────────────────────────────
    const params   = new URLSearchParams(window.location.search);
    const revealId = params.get('id');

    if (!revealId) {
      showError();
    } else {
      loadReveal();
    }

    // ── Load reveal data ───────────────────────────────────
    async function loadReveal() {
      try {
        const res = await fetch(`/.netlify/functions/get-reveal?id=${encodeURIComponent(revealId)}`);

        if (!res.ok) {
          console.error('get-reveal returned', res.status);
          showError();
          return;
        }

        const data = await res.json();

        if (data.error) {
          console.error('get-reveal error:', data.error);
          showError();
          return;
        }

        // Update league name display
        if (data.leagueName) {
          document.getElementById('league-name-display').textContent = data.leagueName;
        }

        hide('loading-state');

        if (data.ready) {
          // Reveal time has passed — start animation
          beginReveal(data.shuffled, data.speed || 'default');
        } else {
          // Not yet — show countdown, poll every second
          show('countdown-state');
          startCountdown(data.revealTime, data.shuffled ? data : null);
        }

      } catch (err) {
        console.error('loadReveal error:', err);
        showError();
      }
    }

    // ── Countdown ──────────────────────────────────────────
    // revealTime is a UTC ISO string stored by the server
    function startCountdown(revealTimeUTC) {
      const revealAt = new Date(revealTimeUTC).getTime();
      const timerEl  = document.getElementById('countdown-timer');

      // Safety check — if time is invalid, show error
      if (isNaN(revealAt)) {
        console.error('Invalid revealTime:', revealTimeUTC);
        showError();
        return;
      }

      // If already past for some reason, reload to get fresh data
      if (Date.now() >= revealAt) {
        loadReveal();
        return;
      }

      function tick() {
        const remaining = revealAt - Date.now();

        if (remaining <= 0) {
          // Time's up — fetch fresh data which will now return ready:true
          timerEl.textContent = '00:00:00';
          setTimeout(loadReveal, 500);
          return;
        }

        const h = Math.floor(remaining / 3600000);
        const m = Math.floor((remaining % 3600000) / 60000);
        const s = Math.floor((remaining % 60000) / 1000);

        timerEl.textContent =
          String(h).padStart(2, '0') + ':' +
          String(m).padStart(2, '0') + ':' +
          String(s).padStart(2, '0');

        setTimeout(tick, 1000);
      }

      tick();
    }

    // ── Begin reveal ───────────────────────────────────────
    function beginReveal(shuffled, speed) {
      hide('countdown-state');
      show('reveal-state');

      const grid = document.getElementById('picks-grid');
      grid.innerHTML = '';

      shuffled.forEach((name, i) => {
        const card = document.createElement('div');
        card.className = 'pick-card';
        card.id = `rcard-${i}`;
        card.innerHTML = `
          <div class="pick-number">Pick ${i + 1}</div>
          <div class="pick-name" id="rname-${i}"></div>
        `;
        grid.appendChild(card);
      });

      const delays = { fast: 1500, default: 3000, slow: 6000 };
      const delay  = delays[speed] || 3000;

      shuffled.forEach((name, i) => {
        setTimeout(() => revealCard(i, name), i * delay + 800);
      });
    }

    function revealCard(idx, name) {
      const card   = document.getElementById(`rcard-${idx}`);
      const nameEl = document.getElementById(`rname-${idx}`);

      gsap.to(card, {
        opacity: 1, duration: 0.25,
        onComplete: () => {
          card.style.borderColor      = 'rgba(139,105,20,0.7)';
          card.style.boxShadow        = '0 0 16px rgba(139,105,20,0.3)';
          splitFlap(nameEl, name, 1100, () => {
            nameEl.classList.add('settled');
            card.style.borderColor = 'rgba(139,105,20,0.45)';
            card.style.boxShadow   = '0 0 8px rgba(139,105,20,0.15)';
          });
        }
      });
    }

    // ── Split-flap ─────────────────────────────────────────
    function splitFlap(el, finalText, duration, onComplete) {
      const chars       = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 -';
      const totalFrames = Math.floor(duration / 90);
      let frame = 0;

      function tick() {
        frame++;
        const progress = frame / totalFrames;
        let display = '';
        for (let i = 0; i < finalText.length; i++) {
          if (i < Math.floor(progress * finalText.length * 1.5)) {
            display += finalText[i].toUpperCase();
          } else {
            display += chars[Math.floor(Math.random() * chars.length)];
          }
        }
        el.textContent = display;
        if (frame < totalFrames) {
          requestAnimationFrame(tick);
        } else {
          el.textContent = finalText.toUpperCase();
          if (onComplete) onComplete();
        }
      }
      requestAnimationFrame(tick);
    }
  </script>

</body>
</html>
